<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediBot — Medical Q&A</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --border: #e2ddd4;
      --text: #1a1a18;
      --text-muted: #8a8478;
      --accent: #1d6a5a;
      --accent-light: #e8f3f0;
      --accent-hover: #165248;
      --bot-bubble: #ffffff;
      --user-bubble: #1d6a5a;
      --warning: #c4622a;
      --warning-bg: #fdf1eb;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Layout ── */
    .app {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      max-height: 900px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 48px rgba(0,0,0,0.12);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .logo p {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #3cb97a;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-reset {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-reset:hover {
      background: var(--border);
      color: var(--text);
    }

    /* ── Disclaimer banner ── */
    .disclaimer {
      background: var(--warning-bg);
      border-bottom: 1px solid #f0d5c4;
      padding: 10px 28px;
      font-size: 12px;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Chat window ── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
    }

    .bot .avatar { background: var(--accent-light); color: var(--accent); }
    .user .avatar { background: var(--accent); color: #fff; font-size: 12px; }

    .bubble-wrap { display: flex; flex-direction: column; gap: 6px; max-width: 78%; }
    .user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 14.5px;
      box-shadow: var(--shadow);
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* Emergency warning style */
    .bubble.emergency {
      border-left: 3px solid var(--warning);
      background: var(--warning-bg);
      color: var(--text);
    }

    /* ── Sources ── */
    .sources {
      margin-top: 6px;
    }

    .sources-toggle {
      font-size: 11.5px;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      background: none;
      border: none;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
    }

    .sources-toggle:hover { opacity: 0.7; }

    .sources-list {
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .sources-list.open { display: flex; }

    .source-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      font-style: italic;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.3s ease;
    }

    .typing-dots {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-top-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p { font-size: 14px; line-height: 1.6; max-width: 380px; margin: 0 auto 20px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion-btn:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 28px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
      background: #fff;
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-size: 14.5px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      line-height: 1.5;
      outline: none;
      max-height: 120px;
      min-height: 24px;
    }

    textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .send-btn svg { width: 16px; height: 16px; fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">🩺</div>
        <div>
          <h1>MediBot</h1>
          <p>RAG-Powered Medical Assistant</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="status-dot"></div>
        <span class="status-text">Online</span>
        <button class="btn-reset" onclick="resetChat()">New Chat</button>
      </div>
    </header>

    <!-- Disclaimer -->
    <div class="disclaimer">
      ⚠️ For informational purposes only. Not a substitute for professional medical advice.
    </div>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">
      <div class="welcome" id="welcomeScreen">
        <h2>Ask me anything medical</h2>
        <p>I'll answer based on trusted medical references. Try one of these:</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="askSuggestion(this)">What are the symptoms of diabetes?</button>
          <button class="suggestion-btn" onclick="askSuggestion(this)">How does hypertension develop?</button>
          <button class="suggestion-btn" onclick="askSuggestion(this)">What is the treatment for asthma?</button>
          <button class="suggestion-btn" onclick="askSuggestion(this)">What causes anemia?</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="msgInput"
          placeholder="Ask a medical question…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
    </div>

  </div>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const msgInput  = document.getElementById('msgInput');
    const sendBtn   = document.getElementById('sendBtn');
    let   isWaiting = false;

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function askSuggestion(btn) {
      msgInput.value = btn.textContent;
      sendMessage();
    }

    function appendMessage(role, text, sources = []) {
      const welcome = document.getElementById('welcomeScreen');
      if (welcome) welcome.remove();

      const isBot  = role === 'bot';
      const isEmergency = isBot && text.includes('⚠️');

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isBot ? '🩺' : 'You';

      const bubbleWrap = document.createElement('div');
      bubbleWrap.className = 'bubble-wrap';

      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (isEmergency ? ' emergency' : '');

      // Render newlines as <br>
      bubble.innerHTML = text.replace(/\n/g, '<br>');
      bubbleWrap.appendChild(bubble);

      // Source accordion (bot only)
      if (isBot && sources.length > 0) {
        const sourcesDiv = document.createElement('div');
        sourcesDiv.className = 'sources';

        const toggle = document.createElement('button');
        toggle.className = 'sources-toggle';
        toggle.innerHTML = `<span>▸</span> ${sources.length} source${sources.length > 1 ? 's' : ''} retrieved`;
        sourcesDiv.appendChild(toggle);

        const list = document.createElement('div');
        list.className = 'sources-list';
        sources.forEach(s => {
          const item = document.createElement('div');
          item.className = 'source-item';
          item.textContent = s;
          list.appendChild(item);
        });
        sourcesDiv.appendChild(list);

        toggle.onclick = () => {
          const open = list.classList.toggle('open');
          toggle.querySelector('span').textContent = open ? '▾' : '▸';
        };

        bubbleWrap.appendChild(sourcesDiv);
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubbleWrap);
      chatWindow.appendChild(wrapper);
      scrollBottom();
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.id = 'typingIndicator';
      el.innerHTML = `
        <div class="avatar" style="background:var(--accent-light);color:var(--accent)">🩺</div>
        <div class="typing-dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
      chatWindow.appendChild(el);
      scrollBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function scrollBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
      const msg = msgInput.value.trim();
      if (!msg || isWaiting) return;

      isWaiting = true;
      sendBtn.disabled = true;
      msgInput.value = '';
      msgInput.style.height = 'auto';

      appendMessage('user', msg);
      showTyping();

      try {
        const form = new FormData();
        form.append('msg', msg);

        const res  = await fetch('/get', { method: 'POST', body: form });
        const data = await res.json();

        hideTyping();
        appendMessage('bot', data.answer, data.sources || []);
      } catch (err) {
        hideTyping();
        appendMessage('bot', '⚠️ Something went wrong. Please try again.');
      }

      isWaiting = false;
      sendBtn.disabled = false;
      msgInput.focus();
    }

    async function resetChat() {
      await fetch('/reset', { method: 'POST' });
      chatWindow.innerHTML = `
        <div class="welcome" id="welcomeScreen">
          <h2>Ask me anything medical</h2>
          <p>I'll answer based on trusted medical references. Try one of these:</p>
          <div class="suggestions">
            <button class="suggestion-btn" onclick="askSuggestion(this)">What are the symptoms of diabetes?</button>
            <button class="suggestion-btn" onclick="askSuggestion(this)">How does hypertension develop?</button>
            <button class="suggestion-btn" onclick="askSuggestion(this)">What is the treatment for asthma?</button>
            <button class="suggestion-btn" onclick="askSuggestion(this)">What causes anemia?</button>
          </div>
        </div>`;
    }

    msgInput.focus();
  </script>
</body>
</html>
